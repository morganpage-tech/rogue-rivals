name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: "@rr/engine2 (lint, test)"
        run: |
          pnpm -F @rr/engine2 lint
          pnpm -F @rr/engine2 test

      - name: "@rr/web (lint, test, build)"
        run: |
          pnpm -F @rr/web lint
          pnpm -F @rr/web test
          pnpm -F @rr/web build
